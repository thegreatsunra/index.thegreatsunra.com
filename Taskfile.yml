version: "3"

tasks:
  build:
    desc: Build public/index.html from templates/index.template.html and sites.yml
    cmds:
      - bash scripts/build.sh

  serve:
    desc: Preview the site locally at http://localhost:3000
    preconditions:
      - sh: command -v npm
        msg: "npm is not installed. Install Node.js from https://nodejs.org"
    cmds:
      - npx serve public
